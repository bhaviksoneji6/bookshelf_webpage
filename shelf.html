<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Shelf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Flip.min.js"></script>
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/landing.css" />
</head>
<body>

  <!-- Background canvas -->
  <canvas id="particles-canvas"></canvas>

  <!-- Navigation -->
  <nav class="nav" id="nav">
    <div class="nav-brand">
      <svg class="nav-logo" viewBox="0 0 24 24" fill="none">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <span id="navUsername">My Library</span>
    </div>
    <div class="nav-right">
      <a href="/" class="nav-home-link">← All Shelves</a>
      <span class="last-updated" id="lastUpdated"></span>
      <button class="nav-share-btn" id="shareBtn" title="Copy link">
        <svg id="shareBtnIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        <span id="shareBtnLabel">Share</span>
      </button>
      <button class="sync-btn" id="syncBtn">
        <svg class="sync-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 4v6h-6M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        Sync
      </button>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero" id="hero">
    <div class="hero-bg-text" aria-hidden="true">READ</div>
    <div class="hero-content">
      <div class="hero-eyebrow" id="heroEyebrow">— Personal Reading Journey —</div>
      <h1 class="hero-title">
        <span class="hero-line hero-line-1" id="heroName">My</span>
        <span class="hero-line hero-line-2">Book<em>shelf</em></span>
      </h1>
      <p class="hero-sub">Every page a world. Every book a life lived.</p>

      <div class="stats-row" id="statsRow">
        <div class="stat-item">
          <div class="stat-val" id="statTotal">—</div>
          <div class="stat-key">Books Read</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-val" id="statYear">—</div>
          <div class="stat-key">This Year</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-val" id="statGenres">—</div>
          <div class="stat-key">Genres</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-val" id="statRating">—</div>
          <div class="stat-key">Avg Rating</div>
        </div>
      </div>
    </div>

    <div class="hero-scroll">
      <div class="scroll-track"></div>
      <span>Scroll to explore</span>
    </div>
  </section>

  <!-- Filters -->
  <div class="filters-bar" id="filtersBar">
    <div class="filters-inner">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Search books or authors…" autocomplete="off" />
        <button class="search-clear" id="searchClear" aria-label="Clear search">✕</button>
      </div>

      <div class="filter-pill-group">
        <label class="filter-label">Year</label>
        <select class="filter-select" id="yearFilter">
          <option value="">All Years</option>
        </select>
      </div>

      <div class="filter-pill-group">
        <label class="filter-label">Sort</label>
        <select class="filter-select" id="sortFilter">
          <option value="year_read_desc">Recently Read</option>
          <option value="year_read_asc">Oldest First</option>
          <option value="rating_desc">Highest Rated</option>
          <option value="rating_asc">Lowest Rated</option>
          <option value="title_asc">A → Z</option>
          <option value="title_desc">Z → A</option>
        </select>
      </div>

      <div class="filter-pill-group genre-pill-group">
        <label class="filter-label">Genre</label>
        <div class="genre-chips-scroll" id="genreChips"></div>
      </div>

      <div class="filter-pill-group">
        <label class="filter-label">Min Rating</label>
        <div class="star-filter" id="starFilter"></div>
      </div>

      <button class="reset-btn" id="resetBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>
        </svg>
        Clear
      </button>

      <div class="results-badge">
        <span id="resultCount">0</span> books
      </div>
    </div>
  </div>

  <!-- Books -->
  <main class="books-section">
    <!-- Skeleton -->
    <div class="skeleton-grid" id="skeletonGrid">
      <!-- JS injects skeletons -->
    </div>

    <!-- Grid -->
    <div class="books-grid" id="booksGrid" style="display:none"></div>

    <!-- Empty -->
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </div>
      <h3 id="emptyTitle">No books found</h3>
      <p id="emptyMsg">Try adjusting your filters</p>
      <button class="empty-sync-btn" id="emptySyncBtn">Sync Library from Goodreads</button>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
      <div class="modal-inner" id="modalInner"></div>
    </div>
  </div>

  <!-- Sync overlay -->
  <div class="sync-overlay" id="syncOverlay">
    <div class="sync-card">
      <div class="sync-rings">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
        <div class="ring-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
        </div>
      </div>
      <h3 id="syncOverlayTitle">Syncing Library</h3>
      <p id="syncOverlayMsg">Fetching your books from Goodreads…</p>
      <div class="l-progress-track" id="syncProgressTrack">
        <div class="l-progress-fill" id="syncProgressFill"></div>
      </div>
      <p class="l-progress-label" id="syncProgressLabel"></p>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <div class="toast-indicator" id="toastIndicator"></div>
    <span class="toast-msg" id="toastMsg"></span>
  </div>

  <script src="/script.js"></script>
</body>
</html>
